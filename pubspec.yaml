name: mini_smart_home
description: Mini Smart Home - University IoT Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.1
  firebase_database: ^10.5.6

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Date Formatting
  intl: ^0.19.0

  # Local Preferences
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/